<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuoteMe Pipeline</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a18; min-height: 100vh; }

:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f1efe8;
  --bg-tertiary: #f9f9f7;
  --text-primary: #1a1a18;
  --text-secondary: #5f5e5a;
  --text-tertiary: #888780;
  --border: rgba(0,0,0,0.12);
  --border-md: rgba(0,0,0,0.2);
  --radius-md: 8px;
  --radius-lg: 12px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1e1e1c;
    --bg-secondary: #2c2c2a;
    --bg-tertiary: #141412;
    --text-primary: #f1efe8;
    --text-secondary: #b4b2a9;
    --text-tertiary: #888780;
    --border: rgba(255,255,255,0.1);
    --border-md: rgba(255,255,255,0.18);
  }
}

.app { padding: 1rem; min-height: 100vh; background: var(--bg-tertiary); }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
.header h1 { font-size: 18px; font-weight: 500; color: var(--text-primary); }
.header-actions { display: flex; gap: 8px; }

.tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; border-bottom: 0.5px solid var(--border); }
.tab { padding: 6px 14px; font-size: 13px; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; color: var(--text-secondary); margin-bottom: -1px; }
.tab.active { color: var(--text-primary); border-bottom-color: #A5CFDD; font-weight: 500; }

.columns { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; align-items: start; }
.column { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 12px; min-height: 300px; }
.col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.col-title { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); }
.col-count { font-size: 11px; background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: 10px; padding: 1px 7px; color: var(--text-secondary); }

.card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 10px 12px; margin-bottom: 8px; cursor: pointer; }
.card:hover { border-color: var(--border-md); }
.card-title { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; line-height: 1.4; }
.card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.badge { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
.badge-p0 { background: #FCEBEB; color: #A32D2D; }
.badge-p1 { background: #FAEEDA; color: #854F0B; }
.badge-p2 { background: #E6F1FB; color: #185FA5; }
.badge-p3 { background: #F1EFE8; color: #5F5E5A; }
.badge-chef { background: #E1F5EE; color: #0F6E56; }
.badge-rep { background: #EEEDFE; color: #534AB7; }
.badge-dist { background: #FAECE7; color: #993C1D; }
.badge-brand { background: #FBEAF0; color: #993556; }
.badge-infra { background: #F1EFE8; color: #3B6D11; }
.card-owner { font-size: 11px; color: var(--text-tertiary); }
.card-task-id { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--border); }

.add-card-btn { width: 100%; text-align: left; background: none; border: none; padding: 6px 4px; font-size: 12px; color: var(--text-tertiary); cursor: pointer; border-radius: var(--radius-md); }
.add-card-btn:hover { background: var(--bg-primary); color: var(--text-secondary); }
.add-col-btn { font-size: 12px; background: none; border: 0.5px dashed var(--border-md); border-radius: var(--radius-md); padding: 4px 10px; cursor: pointer; color: var(--text-secondary); white-space: nowrap; margin-top: 8px; }

.backlog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
.search-bar { display: flex; gap: 8px; margin-bottom: 1rem; }
.search-bar input, .search-bar select { font-size: 13px; padding: 6px 10px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-primary); }
.search-bar input { flex: 1; }

.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 1.25rem; width: 480px; max-width: 95vw; max-height: 85vh; overflow-y: auto; }
.modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; color: var(--text-primary); }
.modal label { font-size: 12px; color: var(--text-secondary); display: block; margin-bottom: 4px; margin-top: 12px; }
.modal input, .modal select, .modal textarea { width: 100%; font-size: 13px; padding: 7px 10px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-primary); }
.modal textarea { min-height: 80px; resize: vertical; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }

.btn { padding: 6px 14px; font-size: 13px; border-radius: var(--radius-md); cursor: pointer; border: 0.5px solid var(--border-md); background: transparent; color: var(--text-primary); }
.btn:hover { background: var(--bg-secondary); }
.btn-primary { background: #A5CFDD; border-color: #A5CFDD; color: #042C53; }
.btn-primary:hover { background: #7FAEC2; border-color: #7FAEC2; }
.btn-danger { color: #A32D2D; border-color: transparent; }
.btn-danger:hover { background: #FCEBEB; }

.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; flex-shrink: 0; }
.dot-todo { background: #B4B2A9; }
.dot-inflight { background: #EF9F27; }
.dot-done { background: #639922; }
.dot-blocked { background: #E24B4A; }

.flow-section { margin-bottom: 1.5rem; }
.flow-header { display: flex; align-items: center; justify-content: space-between; font-size: 13px; font-weight: 500; color: var(--text-secondary); padding-bottom: 6px; border-bottom: 0.5px solid var(--border); margin-bottom: 8px; }
.flow-steps { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.flow-step { background: var(--bg-secondary); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 5px 10px; font-size: 12px; color: var(--text-primary); }
.flow-arrow { font-size: 12px; color: var(--text-tertiary); }

.empty-state { text-align: center; padding: 2rem; color: var(--text-tertiary); font-size: 13px; }
.detail-section { border-top: 0.5px solid var(--border); padding-top: 12px; margin-top: 12px; }
.detail-section h3 { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
</style>
</head>
<body>
<div class="app">
<div class="header">
  <h1>QuoteMe pipeline</h1>
  <div class="header-actions">
    <button class="btn" onclick="openNewCard(null,'backlog')"><i class="ti ti-plus"></i> Add card</button>
    <button class="btn" onclick="openNewColumn()"><i class="ti ti-layout-columns"></i> Add column</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('board',this)">Board</button>
  <button class="tab" onclick="switchTab('backlog',this)">Backlog</button>
  <button class="tab" onclick="switchTab('flows',this)">Flows</button>
</div>

<div id="tab-board"><div class="columns" id="columns-container"></div></div>
<div id="tab-backlog" style="display:none;">
  <div class="search-bar">
    <input type="text" id="backlog-search" placeholder="Search backlog..." oninput="renderBacklog()">
    <select id="backlog-filter" onchange="renderBacklog()">
      <option value="">All areas</option>
      <option value="chef">Chef</option>
      <option value="rep">Rep</option>
      <option value="dist">Distributor</option>
      <option value="brand">Brand</option>
      <option value="infra">Infra</option>
    </select>
  </div>
  <div class="backlog-grid" id="backlog-container"></div>
</div>
<div id="tab-flows" style="display:none;">
  <div id="flows-container"></div>
  <button class="btn" onclick="openNewFlow()" style="margin-top:1rem;"><i class="ti ti-plus"></i> Add flow</button>
</div>
</div>

<div id="modal-root"></div>

<script>
const SK = 'qm-pipeline-v2';
const FK = 'qm-flows-v1';

// ─── API base-URL resolution (mirrors api.ts logic; no build step so inline) ──
// localhost → dev BE; test.quoteme.food host → Test BE; else prod BE
(function() {
  const h = location.hostname;
  if (h === 'localhost' || h === '127.0.0.1') {
    window.__PIPELINE_API_BASE = 'http://localhost:3000';
  } else if (h === 'test.quoteme.food') {
    window.__PIPELINE_API_BASE = 'https://web-test-a640.up.railway.app';
  } else {
    window.__PIPELINE_API_BASE = 'https://web-production-9f6e9.up.railway.app';
  }
})();
const API_BASE = window.__PIPELINE_API_BASE;

// Auth token key — must match api.ts: localStorage.getItem('quoteme_token')
function getApiToken() { try { return localStorage.getItem('quoteme_token'); } catch(e) { return null; } }

function apiHeaders() {
  const t = getApiToken();
  const h = { 'Content-Type': 'application/json' };
  if (t) h['Authorization'] = 'Bearer ' + t;
  return h;
}

function showOfflineBanner() {
  if (document.getElementById('offline-banner')) return;
  const b = document.createElement('div');
  b.id = 'offline-banner';
  b.style.cssText = 'position:fixed;top:8px;right:8px;background:#FAEEDA;color:#854F0B;border:0.5px solid #EFD9A5;border-radius:6px;padding:6px 12px;font-size:12px;z-index:999;';
  b.textContent = 'offline — local only';
  document.body.appendChild(b);
  setTimeout(()=>{ const el=document.getElementById('offline-banner'); if(el) el.remove(); }, 5000);
}

let state = { columns: [
  {id:'todo',title:'To do',status:'todo'},
  {id:'inflight',title:'In flight',status:'inflight'},
  {id:'review',title:'Review',status:'review'},
  {id:'done',title:'Done',status:'done'},
], cards: [], backlog: [] };
let flows = [];

const DC = [
  {id:'c1',title:"I'm a Restaurant button activation",priority:'p0',area:'chef',status:'done',column:'done',notes:'V2.1.0 Item 1. role=chef. FE at 742ed29, verified on test.quoteme.food.',owner:'Claudio',task_id:'742ed29',claudio_notes:'Shipped to prod 2026-05-15. V2.1.0 batch 1. Chef self-signup live at /auth, lands on /dashboard empty state.'},
  {id:'c2',title:'Per-line price column on quote receipt',priority:'p1',area:'chef',status:'todo',column:'todo',notes:'V2.1 Item 2. ~10-20 LOC FE. unit_price_cents in BE, FE not rendering.',owner:'Claudio',task_id:'P-V2.1-receipt-prices',claudio_notes:'Item 19 diagnosis confirmed: 0/18 BE prices null. FE render-only fix, never landed. Blocks Seattle Fish + revenue outreach.'},
  {id:'c3',title:'Chef entry redirect too aggressive',priority:'p1',area:'chef',status:'done',column:'done',notes:'RECENT_QUOTE_KEY in sessionStorage redirects on every /chef/entry. Fix: router-state guard + clear-on-dashboard-mount.',owner:'Claudio',task_id:'c433825',claudio_notes:'Shipped c433825. Redirect now gated on document.referrer matching /chef/status; ChefDashboardPage clears the marker on mount.'},
  {id:'c4',title:'Universal chef topbar audit',priority:'p1',area:'chef',status:'todo',column:'todo',notes:'Audit every chef route, ensure ChefTopbar present. Order guide is known gap.',owner:'Claudio',task_id:'P-V2.1-order-guide-topbar-missing',claudio_notes:''},
  {id:'c5',title:'Hide quote count until chef-send ships',priority:'p1',area:'chef',status:'done',column:'done',notes:'Counts received not sent. ~5-10 LOC conditional render.',owner:'Claudio',task_id:'7d14c08',claudio_notes:'Shipped 7d14c08. Counter rendering suppressed, QuoteCount function retained as V2.1.5 restoration target.'},
  {id:'c6',title:'Mobile bottom nav flash + P0-E consume/me loop',priority:'p1',area:'infra',status:'done',column:'done',notes:'Sequence: Item 7 first (useCallback), then Item 6 (render guard in RootLayout).',owner:'Claudio',task_id:'4f46d0e + be34606',claudio_notes:'Both shipped. 4f46d0e wraps refreshUser + syncWithAuthUser in useCallback (kills the consume/me loop). be34606 adds isLoading render guard to RootLayout (kills the FOUC).'},
  {id:'c7',title:'Em dash in error copy',priority:'p2',area:'chef',status:'done',column:'done',notes:'Tab 2 error copy has em dash. 1-char fix + audit.',owner:'Claudio',task_id:'c433825',claudio_notes:'Shipped c433825 (bundled with Item 3). MultiRestaurantConfirmModal heading + footer reworded. Source-code comments retained — not user-facing.'},
  {id:'c8',title:'Modal truncation merge',priority:'p2',area:'chef',status:'done',column:'done',notes:'fix-v21-modal-truncation at fa67fc1. Ready to FF-merge.',owner:'Claudio',task_id:'95e88be',claudio_notes:'Shipped 95e88be. Cherry-picked fa67fc1 onto staging. Cards now show full restaurant name (was first-word-only).'},
  {id:'c9',title:'Frontend Sentry env vars in Vercel',priority:'p0',area:'infra',status:'todo',column:'todo',notes:'Gates V2 announcement. VITE_SENTRY_DSN + VITE_RELEASE_SHA in Vercel prod.',owner:'Moose',task_id:'Moose Vercel',claudio_notes:'Mini-dispatch surfaced. Owner=Moose, Vercel dashboard action only.'},
  {id:'c10',title:'demo.quoteme.food matching engine parity',priority:'p0',area:'infra',status:'todo',column:'todo',notes:'Item 47. Verify demo uses same engine as prod before external demos.',owner:'Claudio',task_id:'#77 P-V2.1-demo-matching-engine-parity',claudio_notes:''},
  {id:'c11',title:'Chef dashboard',priority:'p1',area:'chef',status:'todo',column:'todo',notes:"Moose top priority next week. Outcome funnels need Moose + Justin conversation first.",owner:'',task_id:'#78 P-V2.5-dashboard-outcome-funnels',claudio_notes:'Empty state v1 shipped with V2 launch. Four design-spec variants (no rep / no catalog / expired link / stuck processing) deferred. Outcome-funnel scoping coupled with quote-count restoration (#54).'},
  {id:'c12',title:'Order guide custom shelf order',priority:'p1',area:'chef',status:'todo',column:'todo',notes:'Justin trust mechanism. No topbar, no rep contact, no delivery days yet.',owner:'',task_id:'#74 P-V2.5',claudio_notes:''},
  {id:'c13',title:'Catalog ingestion Phase B',priority:'p1',area:'dist',status:'inflight',column:'inflight',notes:'Requires catalog URLs alongside 204 distributor records.',owner:'Claudio',task_id:'Phase B.1 ✓ / B.2,B.3 todo',claudio_notes:'Phase B.1 ran on prod: 126,013 brand-tags written across 15+ distributors (Lipari/Wagner/Carmela conventions). Phase B.2 (digits-allowed brands like 5-Hour Energy, Protein2O) and Phase B.3 (Latina ALL-CAPS pattern) queued.'},
  {id:'c14',title:'Matching engine structural fixes',priority:'p1',area:'infra',status:'todo',column:'todo',notes:'43 no_retrieval failures. BLOCKING_STOPWORDS reform + pairwise chaining audit.',owner:'',task_id:'',claudio_notes:'43-failure list source CSV is on Windows host (post_stage3_corpus_run_20260424.csv) — not yet pulled into repo.'},
  {id:'c40',title:'Order guide page — Download Excel + Download PDF non-functional',priority:'p1',area:'chef',status:'todo',column:'todo',notes:"Print works but layout sloppy. Source: Moose's May 19 walk at prod.quoteme.food/chef/order-guide/de218c8f-2d49-4ffe-8f06-d911affb8b9d.",owner:'',task_id:'',claudio_notes:''},
  {id:'c41',title:'Sticky bars overlap Dishes scroll (QuoteBuilder)',priority:'p2',area:'rep',status:'done',column:'done',notes:'Adjust Pricing + QuoteReviewBar sticky bars overlap the Dishes/products scroll panel. Fix: increase pb on outer page div to reserve space below fixed bars.',owner:'Claudio',task_id:'18947f9',claudio_notes:'Fixed in 18947f9. Outer div pb-24→pb-52 (208px) ensures scroll content is never hidden behind fixed bars even when QuoteReviewBar is in expanded state.'},
  {id:'c42',title:"Quote Builder — How do these matches look thumbs widget is decorative",priority:'p2',area:'chef',status:'todo',column:'todo',notes:"Needs spec for what feedback actually does + build. Currently no-op UI. May 19 walk.",owner:'',task_id:'',claudio_notes:''},
  {id:'c43',title:'Quote Builder — Blue bar gap + Finish Quote overlays thumbs-up',priority:'p2',area:'rep',status:'done',column:'done',notes:"Blue sticky bar gap (md:left-64 offset designed for MapIngredients sidebar but firing on QuoteBuilder which has no sidebar). Finish Quote floating button overlays thumbs-up on interaction.",owner:'Claudio',task_id:'18947f9 + 7d066ae',claudio_notes:'Fully closed across two branches. Finish Quote button: fix-c43-c41-quote-builder-layout (18947f9) — bottom-[68px]→bottom-[80px] + z-40→z-50. Blue bar gap: fix-c43-bis-quote-review-bar-prop (7d066ae) — added noSidebarOffset?: boolean prop to QuoteReviewBar; QuoteBuilderPage passes it (no sidebar to clear); MapIngredientsPage callsite unchanged (preserves offset for its actual sidebar). Both branches ship in B6 FE main promotion bundle.'},
  {id:'c44',title:'Gap Filler verification — 18 unmatched ingredients queue check',priority:'p1',area:'infra',status:'todo',column:'todo',notes:"Confirm Lejarreta, Txistorra, Matrimonio, Eggs, Cantabrian Anchovies, Boudin Blanc, Garlic, Fines Herbes, Chipolata Sausages, Celeriac, Sea Urchin, Piquillo Pepper, Bearnaise, Seaweed, Morels, Percebes, sauce heretík, Sauce Verte are queuing into KnowledgeGapSubmission. May 19 walk.",owner:'',task_id:'',claudio_notes:''},
  {id:'c45',title:'Quote pdf_file attach — Attached::One#attach silent-failure on validation',priority:'p0',area:'infra',status:'done',column:'done',notes:"Active Storage internals: attach() calls implicit record.save; when save fails validation (preview_quote_has_no_pricing via after_save :clear_pricing_for_preview, if: :preview? — Quote model line 55), attach returns early WITHOUT raising. Blob is uploaded to R2 (PUT succeeds), but ActiveStorage::Attachment row never persists. pdf_file.attached? returns false. Surfaces as 422 on rep send_quote (quotes_controller.rb:361 has explicit check) but SILENT 200 on guest send (guest_quotes_controller.rb:392 — no check). 9508080e + 721e7035 from May 15 both NULL pdf_url — likely guest-path victims.",owner:'Claudio',task_id:'3a9b4a4',claudio_notes:'Fix shipped to BE prod 2026-05-20 PM at 3a9b4a4 (Promote c45 fix to prod). QuotePdfAttachService surfaces all silent attach validation failures as 422. Origin walk on 9508080e + 721e7035 confirmed guest-send victims (quote_type=guest_quote, pdf_file.attached?=false, chef magic links present). Caveat open: preview?=false at query time suggests state transitioned preview→won after attach OR a different validator fired — universal fix handles either; deeper validator enumeration is follow-up.'},
  {id:'c46',title:'c32 Layer 2 — universal product-name token map (was: two-flavor)',priority:'p2',area:'infra',status:'todo',column:'todo',notes:"REVISED 2026-05-20 PM after Track B audit: ALL 10 top distributors (Lipari, Wagner, Carmela, Maplevale, Feesers, Vitco, Saval, Cityline, S&W, John Gross — 88,151 products total) have 100.0% NULL subcategory. Two-flavor architecture is moot; single-flavor product-name token map is the only viable Layer 2. Template: Lipari pilot at f592818 on feat-c32-lipari-pilot-populated (993 keys, projected 55-65% coverage). Next step: extend pilot template to the other 9 distributors, dispatch dry-run after c32 architecture branch (feat-c32-layer2-per-distributor-category-maps at 368fe2a) promotes to BE main.",owner:'',task_id:'',claudio_notes:''},
  {id:'c47',title:'caxlsx Font.color rejects 6-char hex in OrderGuideService',priority:'p1',area:'infra',status:'todo',column:'todo',notes:"Pre-existing bug surfaced by c40 specs. caxlsx 4.4.1 raises ArgumentError: Invalid Data '2A2A2A' for Font.color. Affects all chef Excel downloads of order guides. Fix: change RGB '2A2A2A' to ARGB 'FF2A2A2A' at the failing call site in app/services/order_guide_service.rb. Stubbed in c40 spec (order_guides_excel_spec.rb) to unblock c40 ship; real fix needed before chef Excel downloads run in prod.",owner:'',task_id:'',claudio_notes:''},
  {id:'c50',title:'Restaurant impersonation routes to created_by_user (rep), not chef — UX mismatch',priority:'p2',area:'infra',status:'todo',column:'todo',notes:"app/controllers/api/v1/admin/restaurants_controller.rb:231 resolves impersonate_user = r.created_by_user. Rep-created restaurants impersonate the rep, giving QM Admin the rep UI when they expected the chef context. Three resolution paths offered: (A) resolve to chef-role contact of the restaurant, (B) chef picker UI for QM Admin to choose contact, (C) rename action to Impersonate Restaurant Creator + add separate Impersonate Chef action. Justin-tier design decision needed.",owner:'',task_id:'',claudio_notes:''},
  {id:'c51',title:'Chef impersonation lands on /chef instead of /dashboard — infinite spinner from auth-mismatch polling',priority:'p1',area:'infra',status:'done',column:'done',notes:"QMAdminChefs.tsx:127 navigates to /chef after token swap. ChefStatusPage polls GUEST endpoint (/api/v1/guest/quotes/:id) requiring X-Guest-Token; impersonation issues JWT only, so polling 404'd indefinitely. Compounded by impersonated chef having no RestaurantContact on the test restaurant. Fix: navigate to /dashboard (already-authed chef shell).",owner:'Claudio',task_id:'2ac9f26',claudio_notes:'HOTFIX shipped 2026-05-20 PM at fix-c51-chef-impersonation-dashboard (2ac9f26). 1 file, 1 line: /chef → /dashboard. Build clean. Rides with B6 FE main promotion bundle.'},
  {id:'c52',title:'Test env restaurant cleanup — 24+ stale dev-cycle restaurants',priority:'p3',area:'infra',status:'todo',column:'todo',notes:"test.quoteme.food/qm-admin/restaurants has 24+ entries from dev cycles — many duplicated 'New Restaurant' rows, SMOKE_TEST_RESTAURANT, Test Quote V2, etc. Doesn't impact prod. Clean for clarity in test impersonation flows + clean test data baseline. Likely a rake task (restaurants:cleanup_test_data) or QM Admin batch delete UI. Test env only — do NOT extend to prod.",owner:'',task_id:'',claudio_notes:''},
  {id:'c53',title:'Sub-route shell persistence — /chef/quotes/:id + /chef/order-guide/:id render outside B6 shell',priority:'p1',area:'chef',status:'todo',column:'todo',notes:"Per Moose May 20 smoke walk (Image 1 + Image 6). Sub-routes mount bare without ChefTabDesktopShell / ChefTabBar wrapping, so nav chrome disappears as soon as chef leaves /dashboard. Should wrap all /chef/* routes that the dashboard navigates to. Bug class: routing/layout. Likely RootLayout chef-role branch needs to detect the chef-prefixed sub-routes and mount them inside the shell instead of as standalone pages.",owner:'',task_id:'',claudio_notes:''},

  {id:'c59',title:'Shell Access Principle — canonical doctrine',priority:'p1',area:'chef',status:'done',column:'done',notes:"DOCTRINE: Known chef always has shell; density follows session by route default. Browse surfaces (/dashboard, /chef/quotes, /chef/quotes list, /chef/catalog, Settings tab) → Full sidebar. In-flow surfaces (/chef/quotes/:id detail, /chef/order-guide/:id detail) → Compact sidebar. Chef can toggle Full↔Compact via masthead button, Hide via footer 'Hide sidebar' button, Restore via floating SidebarRestoreButton (vertical strip). NO localStorage persistence across sessions yet (c61 follow-up). Unknown chef (/chef/welcome, /chef/signup, /chef/entry, /chef/status/:id, /chef root) → NO shell, sign-up/sign-in affordance present (c60 follow-up). Should be referenced in V3 spec going forward.",owner:'Claudio',task_id:'b7fa047',claudio_notes:'Doctrine locked + initial implementation shipped 2026-05-20 PM. c53 chef shell layout (v1: 4815cfc, layer: b7fa047) implements the known-chef shell wrapping + route-driven default density. Cycle toggle untouched per Desi pattern lock (masthead Full↔Compact is correct; the single-cycle Full→Compact→Hidden→Full was Eleven spec error, Desi pushed back).'},

  {id:'c62',title:'Distributor catalog privacy — public / private / invite-only',priority:'p2',area:'dist',status:'todo',column:'todo',notes:"DOCTRINE + future build. Today any chef on QuoteMe can browse any distributor catalog via /chef/catalog/:distributor_id. Distributors must be able to make their catalog private (visible only to chefs they've explicitly granted access). Schema impact: distributor.catalog_visibility enum (public/private/invite-only) + CatalogAccess model for invite-only granular sharing. UI: distributor admin setting, chef-side filtering of unaffiliated distributors based on visibility, 'Request access' affordance for private catalogs. Doctrine locked 2026-05-20 PM (Moose); build TBD pending Desi UX + Justin product call.",owner:'',task_id:'',claudio_notes:''},
  {id:'c63',title:'--qm-hover-blue renamed to --accent — semantic clarification + FE canonical addition',priority:'p2',area:'infra',status:'done',column:'done',notes:"DOCTRINE UPDATE. Per Desi 2026-05-20 PM: --qm-hover-blue was never a hover state; it's the secondary brand accent for operational/alive signals — trust-ribbon dot, CatalogStatusBadge connected-state dot, status-stepper 'live' indicator, operational-footnote icons (map-pin, shield, lightbulb). Independent hue from --primary orange; they do not share a relationship. Added to FE canonical token set at #7FAEC2 (was the constitution's 'QuoteMe Blue hover' value — Desi has been using it as accent all along). Constitution color spec unchanged — QuoteMe Blue #A5CFDD + Sacred Orange #F2993D primary remain. --accent is the formal name for the operational accent that was always present but mislabeled. Hardcoded rgba(127,174,194,.22/.25/.20) literals in CatalogStatusBadge + ChefCatalogSelectionPage + ChefDashboardPage StatusPill (Desi's find-and-replace gotcha) converted to color-mix(in srgb, var(--accent) XX%, transparent) for theme propagation. Modern CSS, ~95% browser support (Safari 16.4+).",owner:'Claudio',task_id:'eb3855e',claudio_notes:'Shipped on chore/desi-handoff-token-sweep (eb3855e). theme.css line 17-18: --accent reassigned #F2993D→#7FAEC2, --accent-foreground #ffffff→#2A5F6F. Safe — pre-sweep grep confirmed zero components consumed var(--accent) directly. 4 FE files rgba→color-mix. Desi handoff folder: 26 of 27 remaining --qm-* refs cleared (3 new mappings: --qm-gray-100→--muted, --qm-gray-400→--muted-foreground icon-only chevrons, --qm-hover-blue→--accent). INDEX.md updated with full conversion table + rgba note. 1 leftover --qm-orange comment converted manually. Dark-mode --accent override left at existing oklch gray — Eleven decision if dark-mode accent should match new blue semantic.'},
  {id:'c64',title:'Chef ↔ Distributor trusted connection',priority:'p2',area:'chef',status:'todo',column:'todo',notes:"Chef v.5. Once a chef has the trust of a distributor (active buyer status, repeat quoting, established relationship), chef can build their OWN priced quote against that distributor's catalog without rep round-trip. Distributor opts in. Catalog has current prices, chef sees them, chef builds and confirms. Rep still owns final pricing approval per Mode B doctrine. Trust-gated expansion of the loop closed in Chef v3. Depends on: Chef v3 (rep onboarding + chef-initiated quote loop), distributor opt-in mechanism for chef direct pricing.",owner:'',task_id:'',claudio_notes:'Filed 2026-05-26 from Fifteen dispatch. Backlog (rendered as todo since no backlog column exists today).'},
  {id:'c65',title:'Catalog soft-delete protection',priority:'p1',area:'infra',status:'todo',column:'todo',notes:"D-LOCK-2 from Moose 2026-05-26. Catalogs must be append-only. quote_lines.product_id FK relationships break if a Catalog (and its child Products) get destroyed — destroying a catalog breaks all historical quotes that referenced it. Implement soft-delete-only enforcement: deny Catalog#destroy via model callback, route deactivation through superseded_by_id mechanism only. Forward-compat protection: cost minimal now, prevents data loss later. Pairs with Phase 2 catalog schema additions (data_source enum, superseded_by_id).",owner:'',task_id:'',claudio_notes:'Filed 2026-05-26 from Fifteen / Moose conversation. D-LOCK-2 codified — see Phase 1A dispatch.'},

  {id:'c67',title:'Schema migration idempotency standard',priority:'p2',area:'infra',status:'todo',column:'todo',notes:"Doctrine from 2026-05-26 outage postmortem (P1A-4 quote state machine). Every add_column guarded with column_exists?, every add_index with index_exists?, every remove_column / remove_index guarded similarly. Makes migrations re-runnable and prevents prod-state-divergence outages — the P1A-4 migration hit PG::DuplicateColumn on quotes.confirmed_at (already existed), aborted the transaction, left quotes.state absent while the Quote model validated :state, and 500'd every quote save until a hotfix landed. CI lint rule eventually; team migration-checklist near-term. See POSTMORTEM_2026-05-26_P1A4.md.",owner:'',task_id:'',claudio_notes:'Filed 2026-05-26 from outage postmortem. Doctrine adopted: idempotent migrations standard going forward.'},

// ─── Persistence: shared pipeline_cards API + localStorage fallback cache ────

async function loadFromApi() {
  try {
    const res = await fetch(API_BASE + '/api/v1/admin/pipeline_cards', { headers: apiHeaders() });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const all = data.cards || [];
    // board cards: placement === 'board'; backlog cards: placement === 'backlog'
    state.cards   = all.filter(c => c.placement === 'board');
    state.backlog = all.filter(c => c.placement === 'backlog');
    // Seed columns from defaults if none on server
    if (!state.columns || !state.columns.length) {
      state.columns = [
        {id:'todo',title:'To do',status:'todo'},
        {id:'inflight',title:'In flight',status:'inflight'},
        {id:'review',title:'Review',status:'review'},
        {id:'done',title:'Done',status:'done'},
      ];
    }
    // Fallback to DC/DB seeds only if server returned truly empty
    if (!state.cards.length && !state.backlog.length) { state.cards = DC; state.backlog = DB; }
    // Cache locally for offline fallback
    try { localStorage.setItem(SK, JSON.stringify({columns:state.columns,cards:state.cards,backlog:state.backlog})); } catch(e) {}
  } catch(err) {
    console.warn('[pipeline] API load failed, falling back to localStorage:', err);
    showOfflineBanner();
    _loadLocal();
  }
  // Flows always from localStorage
  try { const f = localStorage.getItem(FK); if (f) { flows=JSON.parse(f); } else { flows=DF; } } catch(e) { flows=DF; }
  render();
}

function _loadLocal() {
  try { const d = localStorage.getItem(SK); if (d) { const p=JSON.parse(d); state.columns=p.columns||state.columns; state.cards=p.cards||DC; state.backlog=p.backlog||DB; } else { state.cards=DC; state.backlog=DB; } } catch(e) { state.cards=DC; state.backlog=DB; }
}

async function save() {
  // Build payload: both board and backlog cards, tagged by placement
  const boardCards   = state.cards.map(c => ({...c, placement:'board'}));
  const backlogCards = state.backlog.map(c => ({...c, placement:'backlog'}));
  const allCards = [...boardCards, ...backlogCards];

  try {
    const res = await fetch(API_BASE + '/api/v1/admin/pipeline_cards/bulk', {
      method: 'PUT',
      headers: apiHeaders(),
      body: JSON.stringify({ cards: allCards }),
    });
    if (res.ok) {
      const data = await res.json();
      const all = data.cards || [];
      // Replace local state with server response so new cards get server ids
      state.cards   = all.filter(c => c.placement === 'board');
      state.backlog = all.filter(c => c.placement === 'backlog');
    } else {
      console.warn('[pipeline] bulk save HTTP', res.status);
    }
  } catch(err) {
    console.warn('[pipeline] bulk save failed (offline?):', err);
  }

  // Always keep localStorage as fallback cache
  try { localStorage.setItem(SK, JSON.stringify({columns:state.columns,cards:state.cards,backlog:state.backlog})); } catch(e) {}
  // Flows always stay in localStorage
  try { localStorage.setItem(FK, JSON.stringify(flows)); } catch(e) {}
}

function pBadge(p) { return p ? `<span class="badge badge-${p}">${p.toUpperCase()}</span>` : ''; }
function aBadge(a) { const l={chef:'Chef',rep:'Rep',dist:'Distributor',brand:'Brand',infra:'Infra'}; return a ? `<span class="badge badge-${a}">${l[a]||a}</span>` : ''; }
function sDot(s) { const m={todo:'todo',inflight:'inflight',review:'inflight',done:'done',blocked:'blocked',live:'done',partial:'inflight',planned:'todo'}; return `<span class="status-dot dot-${m[s]||'todo'}"></span>`; }

function render() { renderBoard(); renderBacklog(); renderFlows(); }

function renderBoard() {
  const c = document.getElementById('columns-container'); if (!c) return;
  c.innerHTML = state.columns.map(col => {
    const cards = state.cards.filter(x => x.column===col.id);
    return `<div class="column" ondragover="event.preventDefault()" ondrop="dropCard(event,'${col.id}')">
      <div class="col-header"><span class="col-title">${sDot(col.status)}${col.title}</span><span class="col-count">${cards.length}</span></div>
      ${cards.map(card=>`<div class="card" draggable="true" ondragstart="dragStart(event,'${card.id}')" onclick="openCardDetail('${card.id}','board')">
        <div class="card-title">${card.title}</div>
        <div class="card-meta">${pBadge(card.priority)}${aBadge(card.area)}${card.task_id?`<span class="card-task-id">${card.task_id}</span>`:''}${card.owner?`<span class="card-owner">${card.owner}</span>`:''}</div>
        <div class="card-claim-row" style="margin-top:6px;display:flex;align-items:center;gap:6px;" onclick="event.stopPropagation()">
          ${card.claimed_at
            ? `<span style="font-size:11px;color:var(--text-secondary);">&#128100; ${card.claimed_by?card.claimed_by.name:(card.owner||'Claimed')}</span><button class="btn" style="padding:2px 8px;font-size:11px;" onclick="releaseCard('${card.id}')">Release</button>`
            : `<button class="btn" style="padding:2px 8px;font-size:11px;" onclick="claimCard('${card.id}')">Claim</button>`
          }
        </div>
      </div>`).join('')}
      <button class="add-card-btn" onclick="openNewCard('${col.id}','board')"><i class="ti ti-plus"></i> Add card</button>
    </div>`;
  }).join('') + `<div><button class="add-col-btn" onclick="openNewColumn()">+ Column</button></div>`;
}

function renderBacklog() {
  const c = document.getElementById('backlog-container'); if (!c) return;
  const q = (document.getElementById('backlog-search')||{}).value||'';
  const f = (document.getElementById('backlog-filter')||{}).value||'';
  const items = state.backlog.filter(b=>(!q||b.title.toLowerCase().includes(q.toLowerCase()))&&(!f||b.area===f));
  c.innerHTML = items.length ? items.map(b=>`<div class="card" onclick="openCardDetail('${b.id}','backlog')">
    <div class="card-title">${b.title}</div>
    <div class="card-meta" style="margin-top:4px;">${pBadge(b.priority)}${aBadge(b.area)}</div>
    ${b.notes?`<div style="font-size:11px;color:var(--text-tertiary);margin-top:5px;line-height:1.4;">${b.notes.substring(0,80)}${b.notes.length>80?'…':''}</div>`:''}
  </div>`).join('') : '<div class="empty-state">No items matching filter.</div>';
}

function renderFlows() {
  const c = document.getElementById('flows-container'); if (!c) return;
  const sl={live:'Live',partial:'Partial',planned:'Planned'};
  c.innerHTML = flows.map(f=>`<div class="flow-section">
    <div class="flow-header">
      <span style="display:flex;align-items:center;">${sDot(f.status)}${f.title}</span>
      <span style="display:flex;align-items:center;gap:8px;"><span style="font-size:11px;color:var(--text-tertiary);">${sl[f.status]||f.status}</span><button class="btn" style="padding:2px 8px;font-size:11px;" onclick="openFlowDetail('${f.id}')">Edit</button></span>
    </div>
    <div class="flow-steps">${f.steps.map((s,i)=>`<span class="flow-step">${s}</span>${i<f.steps.length-1?'<span class="flow-arrow">→</span>':''}`).join('')}</div>
  </div>`).join('');
}

let dragId=null;
function dragStart(e,id){dragId=id;}
function dropCard(e,colId){e.preventDefault();if(!dragId)return;const card=state.cards.find(c=>c.id===dragId);if(card){card.column=colId;save();renderBoard();}dragId=null;}

function switchTab(tab,el){
  ['board','backlog','flows'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===tab?'':'none';});
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); render();
}

function showModal(html){document.getElementById('modal-root').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

function openNewCard(colId,source){
  const isB=source==='backlog';
  showModal(`<h2>${isB?'Add to backlog':'New card'}</h2>
    <label>Title</label><input id="m-title" type="text" placeholder="Card title">
    <label>Task ID <span style="font-weight:normal;color:var(--text-tertiary);font-size:11px;">(commit, ticket, P-V2.1-* tag)</span></label><input id="m-task-id" type="text" placeholder="e.g. 7d14c08 or #75" style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;">
    <label>Priority</label><select id="m-priority"><option value="">None</option>${['p0','p1','p2','p3'].map(p=>`<option value="${p}">${p.toUpperCase()}</option>`).join('')}</select>
    <label>Area</label><select id="m-area"><option value="">None</option>${['chef','rep','dist','brand','infra'].map(a=>`<option value="${a}">${a.charAt(0).toUpperCase()+a.slice(1)}</option>`).join('')}</select>
    ${!isB?`<label>Column</label><select id="m-column">${state.columns.map(c=>`<option value="${c.id}" ${c.id===colId?'selected':''}>${c.title}</option>`).join('')}</select><label>Owner</label><input id="m-owner" type="text" placeholder="Claudio, Moose, Desi...">`:'' }
    <label>Notes</label><textarea id="m-notes" placeholder="Context, links, dependencies..."></textarea>
    <label>Claudio notes <span style="font-weight:normal;color:var(--text-tertiary);font-size:11px;">(status note when moved)</span></label><textarea id="m-claudio-notes" rows="2" placeholder="e.g. shipped f772cf1, blocked on Sandra seed..."></textarea>
    <div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveNewCard(${isB})">Add card</button></div>`);
}

function saveNewCard(isB){
  const title=document.getElementById('m-title').value.trim(); if(!title)return;
  const id='c'+Date.now(),priority=document.getElementById('m-priority').value,area=document.getElementById('m-area').value,notes=document.getElementById('m-notes').value;
  const task_id=document.getElementById('m-task-id').value,claudio_notes=document.getElementById('m-claudio-notes').value;
  if(isB){state.backlog.push({id,title,priority,area,notes,task_id,claudio_notes});}
  else{const column=document.getElementById('m-column').value,owner=document.getElementById('m-owner').value;state.cards.push({id,title,priority,area,column,owner,notes,task_id,claudio_notes,status:column});}
  save();closeModal();render();
}

function openCardDetail(id,source){
  const isB=source==='backlog';
  const arr=isB?state.backlog:state.cards;
  const card=arr.find(c=>c.id===id); if(!card)return;
  showModal(`<h2>${card.title}</h2>
    <label>Title</label><input id="m-title" type="text" value="${(card.title||'').replace(/"/g,'&quot;')}">
    <label>Task ID <span style="font-weight:normal;color:var(--text-tertiary);font-size:11px;">(commit, ticket, P-V2.1-* tag)</span></label><input id="m-task-id" type="text" value="${(card.task_id||'').replace(/"/g,'&quot;')}" style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;">
    <label>Priority</label><select id="m-priority"><option value="">None</option>${['p0','p1','p2','p3'].map(p=>`<option value="${p}" ${card.priority===p?'selected':''}>${p.toUpperCase()}</option>`).join('')}</select>
    <label>Area</label><select id="m-area"><option value="">None</option>${['chef','rep','dist','brand','infra'].map(a=>`<option value="${a}" ${card.area===a?'selected':''}>${a.charAt(0).toUpperCase()+a.slice(1)}</option>`).join('')}</select>
    ${!isB?`<label>Column</label><select id="m-column">${state.columns.map(c=>`<option value="${c.id}" ${card.column===c.id?'selected':''}>${c.title}</option>`).join('')}</select><label>Owner</label><input id="m-owner" type="text" value="${(card.owner||'').replace(/"/g,'&quot;')}">`:'' }
    <label>Notes</label><textarea id="m-notes">${card.notes||''}</textarea>
    <label>Claudio notes <span style="font-weight:normal;color:var(--text-tertiary);font-size:11px;">(status note when moved)</span></label><textarea id="m-claudio-notes" rows="2">${card.claudio_notes||''}</textarea>
    ${!isB?`<div class="detail-section"><h3>Move to backlog</h3><button class="btn" onclick="moveToBacklog('${id}')">Move to backlog</button></div>`:`<div class="detail-section"><h3>Move to board</h3><button class="btn" onclick="moveToBoard('${id}')">Move to board</button></div>`}
    <div class="modal-footer"><button class="btn btn-danger" onclick="deleteCard('${id}','${source}')"><i class="ti ti-trash"></i> Delete</button><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveCardDetail('${id}','${source}')">Save</button></div>`);
}

function saveCardDetail(id,source){
  const isB=source==='backlog';const arr=isB?state.backlog:state.cards;const card=arr.find(c=>c.id===id);if(!card)return;
  card.title=document.getElementById('m-title').value;card.priority=document.getElementById('m-priority').value;card.area=document.getElementById('m-area').value;card.notes=document.getElementById('m-notes').value;
  card.task_id=document.getElementById('m-task-id').value;card.claudio_notes=document.getElementById('m-claudio-notes').value;
  if(!isB){card.column=document.getElementById('m-column').value;card.owner=document.getElementById('m-owner').value;}
  save();closeModal();render();
}

async function deleteCard(id,source){
  const isB=source==='backlog';
  const arr=isB?state.backlog:state.cards;
  const card=arr.find(c=>c.id===id);
  // If card has a server-assigned UUID id, call DELETE endpoint
  if(card && card.id && /^[0-9a-f-]{36}$/.test(card.id)){
    try {
      await fetch(API_BASE+'/api/v1/admin/pipeline_cards/'+card.id, {method:'DELETE',headers:apiHeaders()});
    } catch(err) { console.warn('[pipeline] DELETE failed:', err); }
  }
  if(isB){state.backlog=state.backlog.filter(c=>c.id!==id);}else{state.cards=state.cards.filter(c=>c.id!==id);}
  save();closeModal();render();
}
function moveToBacklog(id){const card=state.cards.find(c=>c.id===id);if(!card)return;state.backlog.push({id:card.id,title:card.title,priority:card.priority,area:card.area,notes:card.notes});state.cards=state.cards.filter(c=>c.id!==id);save();closeModal();render();}
function moveToBoard(id){const item=state.backlog.find(b=>b.id===id);if(!item)return;state.cards.push({...item,column:'todo',status:'todo',owner:''});state.backlog=state.backlog.filter(b=>b.id!==id);save();closeModal();render();}

function openNewColumn(){showModal(`<h2>New column</h2><label>Title</label><input id="m-col-title" type="text" placeholder="e.g. Blocked, QA"><label>Status</label><select id="m-col-status">${['todo','inflight','review','done','blocked'].map(s=>`<option value="${s}">${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}</select><div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveNewColumn()">Add</button></div>`);}
function saveNewColumn(){const title=document.getElementById('m-col-title').value.trim();if(!title)return;state.columns.push({id:'col'+Date.now(),title,status:document.getElementById('m-col-status').value});save();closeModal();renderBoard();}

function openNewFlow(){showModal(`<h2>New flow</h2><label>Title</label><input id="m-flow-title" type="text"><label>Status</label><select id="m-flow-status"><option value="planned">Planned</option><option value="partial">Partial</option><option value="live">Live</option></select><label>Steps (one per line)</label><textarea id="m-flow-steps" placeholder="Step 1&#10;Step 2"></textarea><div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveNewFlow()">Add</button></div>`);}
function saveNewFlow(){const title=document.getElementById('m-flow-title').value.trim();if(!title)return;flows.push({id:'f'+Date.now(),title,status:document.getElementById('m-flow-status').value,steps:document.getElementById('m-flow-steps').value.split('\n').map(s=>s.trim()).filter(Boolean)});save();closeModal();renderFlows();}
function openFlowDetail(id){const flow=flows.find(f=>f.id===id);if(!flow)return;showModal(`<h2>Edit flow</h2><label>Title</label><input id="m-flow-title" type="text" value="${(flow.title||'').replace(/"/g,'&quot;')}"><label>Status</label><select id="m-flow-status">${['planned','partial','live'].map(s=>`<option value="${s}" ${flow.status===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}</select><label>Steps (one per line)</label><textarea id="m-flow-steps">${flow.steps.join('\n')}</textarea><div class="modal-footer"><button class="btn btn-danger" onclick="deleteFlow('${id}')"><i class="ti ti-trash"></i> Delete</button><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveFlowDetail('${id}')">Save</button></div>`);}
function saveFlowDetail(id){const flow=flows.find(f=>f.id===id);if(!flow)return;flow.title=document.getElementById('m-flow-title').value;flow.status=document.getElementById('m-flow-status').value;flow.steps=document.getElementById('m-flow-steps').value.split('\n').map(s=>s.trim()).filter(Boolean);save();closeModal();renderFlows();}
function deleteFlow(id){flows=flows.filter(f=>f.id!==id);save();closeModal();renderFlows();}

// ─── Claim / Release actions ─────────────────────────────────────────────────

async function claimCard(id) {
  const card = state.cards.find(c => c.id === id);
  if (!card) return;
  // Only callable when card has a server UUID id
  if (!card.id || !/^[0-9a-f-]{36}$/.test(card.id)) {
    console.warn('[pipeline] claimCard: card has no server id, save first');
    return;
  }
  try {
    const res = await fetch(API_BASE + '/api/v1/admin/pipeline_cards/' + card.id + '/claim', {
      method: 'POST', headers: apiHeaders(),
    });
    if (res.ok) {
      const updated = await res.json();
      Object.assign(card, updated);
      renderBoard();
    } else {
      console.warn('[pipeline] claim HTTP', res.status);
    }
  } catch(err) { console.warn('[pipeline] claim failed:', err); }
}

async function releaseCard(id) {
  const card = state.cards.find(c => c.id === id);
  if (!card) return;
  if (!card.id || !/^[0-9a-f-]{36}$/.test(card.id)) return;
  try {
    const res = await fetch(API_BASE + '/api/v1/admin/pipeline_cards/' + card.id + '/release', {
      method: 'POST', headers: apiHeaders(),
    });
    if (res.ok) {
      const updated = await res.json();
      Object.assign(card, updated);
      renderBoard();
    } else {
      console.warn('[pipeline] release HTTP', res.status);
    }
  } catch(err) { console.warn('[pipeline] release failed:', err); }
}

// ─── Boot ────────────────────────────────────────────────────────────────────
loadFromApi();
</script>
</body>
