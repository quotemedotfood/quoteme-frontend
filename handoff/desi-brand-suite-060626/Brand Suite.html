<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QuoteMe — Brand Suite</title>

  <link rel="stylesheet" href="assets/colors_and_type.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body { margin: 0; padding: 0; background: #F2F0EA; font-family: var(--qm-sans); color: var(--qm-charcoal); }
    .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }
    .serif { font-family: var(--qm-serif); }
    .sans { font-family: var(--qm-sans); }
    .hairline { border-color: var(--qm-soft-line); }
    .ink { color: var(--qm-charcoal); }
    .ink-soft { color: var(--qm-gray-700); }
    .ink-faint { color: var(--qm-gray-500); }

    /* Gallery shell */
    .gallery { max-width: 1640px; margin: 0 auto; padding: 64px 48px 96px; }
    .gallery-header { max-width: 900px; margin-bottom: 64px; }
    .gallery-section { margin-top: 72px; }
    .gallery-section + .gallery-section { margin-top: 96px; }
    .section-head { max-width: 900px; margin-bottom: 28px; }
    .section-row { display: flex; flex-wrap: wrap; gap: 32px; align-items: flex-start; }
    .artboard { display: flex; flex-direction: column; gap: 10px; }
    .artboard-label {
      font-family: var(--qm-sans); font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; color: rgba(40,30,20,.55);
    }

    /* Desktop artboard surface — bounded canvas for sidebar layouts */
    .desktop { width: 1280px; border: 1px solid var(--qm-soft-line); border-radius: 12px; overflow: hidden; background: #fff; }

    /* iPhone frame */
    .phone {
      width: 390px; height: 844px; background: #ffffff; border-radius: 36px;
      box-shadow: 0 1px 0 rgba(0,0,0,.04) inset, 0 24px 60px rgba(43,43,43,.10), 0 0 0 1px rgba(0,0,0,.05);
      overflow: hidden; position: relative; font-family: var(--qm-sans); color: var(--qm-charcoal);
    }
    .phone .screen { position: absolute; inset: 0; overflow: hidden; display: flex; flex-direction: column; }
    .phone .statusbar {
      height: 44px; flex: 0 0 44px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px 0 28px; font-size: 14px; font-weight: 600; color: var(--qm-charcoal); font-variant-numeric: tabular-nums;
    }
    .phone .statusbar .right { display: flex; align-items: center; gap: 5px; }
    .phone .home-indicator {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 134px; height: 5px; border-radius: 999px; background: rgba(0,0,0,.85);
    }

    /* Buttons */
    .qm-btn { display:inline-flex; align-items:center; justify-content:center; gap:8px;
      font-family: var(--qm-sans); font-weight: 500; font-size: 15px; border-radius: 6px; padding: 12px 18px; line-height: 1;
      transition: background-color .15s ease, color .15s ease, border-color .15s ease;
      cursor: pointer; user-select: none; border: 1px solid transparent;
    }
    .qm-btn-orange { background: #F2993D; color: #fff; }
    .qm-btn-orange:hover { background: #E0852C; }
    .qm-btn-outline { background: #fff; color: var(--qm-charcoal); border-color: var(--qm-soft-line); }
    .qm-btn-outline:hover { background: var(--qm-gray-50); }
    .qm-btn-text { background: transparent; color: var(--qm-gray-700); padding: 12px 8px; }
    .qm-btn-text:hover { color: var(--qm-charcoal); }
    .qm-btn-full { width: 100%; }

    /* Pill */
    .qm-pill { display:inline-flex; align-items:center; gap:6px; padding:3px 10px;
      font-size: 11px; font-weight: 500; border-radius: 999px; line-height: 1.4; }

    /* eyebrow */
    .qm-eyebrow {
      font-family: var(--qm-sans); font-weight: 600; font-size: 11px;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--qm-gray-700);
    }

    /* Inputs */
    .qm-input {
      width: 100%; background: #fff; border: 1px solid var(--qm-soft-line); border-radius: 8px;
      padding: 10px 12px; font-family: var(--qm-sans); font-size: 14px; color: var(--qm-charcoal);
      transition: border-color .15s ease;
    }
    .qm-input:focus { outline: none; border-color: var(--qm-charcoal); }
    .qm-textarea {
      width: 100%; min-height: 120px; background: #fff; border: 1px solid var(--qm-soft-line);
      border-radius: 8px; padding: 12px 14px; font-family: var(--qm-sans); font-size: 14px;
      color: var(--qm-charcoal); resize: vertical; line-height: 1.55;
    }
    .qm-textarea:focus { outline: none; border-color: var(--qm-charcoal); }

    /* Document rules */
    .doc-divider-thick { border-top: 2px solid var(--qm-charcoal); }
    .doc-divider { border-top: 1px solid var(--qm-soft-line); }

    /* Scroll inside phone screens */
    .scroller { flex: 1 1 0; overflow-y: auto; }
    .scroller::-webkit-scrollbar { width: 0; }

    button:focus-visible { outline: none; }

    #app:empty::before {
      content: "Loading…"; display: block; padding: 80px 48px; color: rgba(40,30,20,.4);
      font-family: var(--qm-serif); font-size: 22px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- Design-system substrate (shared with Chef Flow + Rep Suite + Command Center) -->
  <script type="text/babel" data-presets="react" src="src/document.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/screens-desktop.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/screens-tabs.jsx"></script>

  <!-- Brand suite (the brand agent's editable surface) -->
  <script type="text/babel" data-presets="react" src="src/screens-brand.jsx"></script>

  <!-- Profiles module — brand profile preview reuses BrandProfileBody -->
  <script type="text/babel" data-presets="react" src="src/screens-profiles.jsx"></script>

  <!-- Brand-only gallery shell -->
  <script type="text/babel" data-presets="react" src="src/gallery-brand.jsx"></script>

  <script>
    // Debounced lucide icon hydration (same pattern as the other entries).
    let pending = false;
    const renderIcons = () => { pending = false; try { lucide.createIcons(); } catch (e) {} };
    const schedule = () => { if (pending) return; pending = true; requestAnimationFrame(renderIcons); };
    new MutationObserver(schedule).observe(document.body, { childList: true, subtree: true });
    window.addEventListener('load', () => setTimeout(renderIcons, 200));
  </script>
</body>
</html>
